<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Scan — AgroAI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .live-scan-wrapper {
            position: relative;
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0d0f12;
            border-radius: var(--border-radius-card);
            overflow: hidden;
            border: 1px solid rgba(197, 242, 85, 0.2);
            box-shadow: 0 0 50px rgba(197, 242, 85, 0.05) inset;
        }

        /* Camera Feed Background */
        .camera-feed {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #000 url('https://images.unsplash.com/photo-1595054366627-c1d0ca5d0d93?auto=format&fit=crop&q=80&w=1600') center/cover;
            filter: contrast(1.1) brightness(0.6) saturate(1.2);
            z-index: 0;
        }

        /* Scan Grid Overlay */
        .hud-grid {
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(rgba(197, 242, 85, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(197, 242, 85, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: 1;
            pointer-events: none;
            animation: gridDrift 20s linear infinite;
        }

        @keyframes gridDrift {
            0% { background-position: 0 0; }
            100% { background-position: 50px 50px; }
        }

        /* CRT Scanline effect */
        .scanlines {
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.1) 50%, rgba(0,0,0,0.1));
            background-size: 100% 4px;
            z-index: 2;
            pointer-events: none;
        }

        /* The sweeping laser line */
        .laser-sweep {
            position: absolute;
            left: 0;
            right: 0;
            height: 4px;
            background: rgba(197, 242, 85, 0.8);
            box-shadow: 0 0 20px 8px rgba(197, 242, 85, 0.4);
            z-index: 3;
            animation: sweepDown 4s ease-in-out infinite alternate;
        }

        @keyframes sweepDown {
            0% { top: 5%; opacity: 0.2; }
            50% { opacity: 1; }
            100% { top: 95%; opacity: 0.2; }
        }

        /* Targeting Reticle */
        .reticle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 300px;
            z-index: 4;
            pointer-events: none;
            animation: reticlePulse 2s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }

        .reticle::before, .reticle::after {
            content: '';
            position: absolute;
            inset: 0;
            border: 2px solid rgba(197, 242, 85, 0.8);
            border-radius: 50%;
        }

        .reticle::before {
            border-style: dashed;
            animation: spinRight 10s linear infinite;
        }

        .reticle::after {
            border-style: dotted;
            margin: -15px;
            border-color: rgba(245, 162, 69, 0.6);
            animation: spinLeft 15s linear infinite;
        }

        .reticle-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 10px;
            height: 10px;
            background: #C5F255;
            border-radius: 50%;
            box-shadow: 0 0 15px #C5F255;
        }

        .reticle-corner {
            position: absolute;
            width: 40px;
            height: 40px;
            border-color: #C5F255;
            border-style: solid;
        }

        .reticle-corner.tl { top: -20px; left: -20px; border-width: 3px 0 0 3px; }
        .reticle-corner.tr { top: -20px; right: -20px; border-width: 3px 3px 0 0; }
        .reticle-corner.bl { bottom: -20px; left: -20px; border-width: 0 0 3px 3px; }
        .reticle-corner.br { bottom: -20px; right: -20px; border-width: 0 3px 3px 0; }

        @keyframes spinRight { 100% { transform: rotate(360deg); } }
        @keyframes spinLeft { 100% { transform: rotate(-360deg); } }
        @keyframes reticlePulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); filter: drop-shadow(0 0 5px rgba(197, 242, 85, 0.5)); }
            50% { transform: translate(-50%, -50%) scale(1.05); filter: drop-shadow(0 0 15px rgba(197, 242, 85, 0.8)); }
        }

        /* HUD Data Stream */
        .hud-data {
            position: absolute;
            bottom: 30px;
            left: 30px;
            z-index: 5;
            font-family: 'JetBrains Mono', monospace;
            color: #C5F255;
            font-size: 13px;
            line-height: 1.5;
            text-shadow: 0 0 5px rgba(197, 242, 85, 0.5);
            pointer-events: none;
        }

        .data-line { overflow: hidden; white-space: nowrap; }
        .data-line.typing { animation: typing 2s steps(40, end) infinite alternate; }

        @keyframes typing {
            from { width: 0; }
            to { width: 100%; }
        }

        /* Target Bounding Boxes */
        .bounding-box {
            position: absolute;
            border: 2px solid rgba(245, 162, 69, 0.8);
            background: rgba(245, 162, 69, 0.1);
            z-index: 4;
            animation: boxFade 3s infinite alternate;
        }

        .bounding-box::after {
            content: attr(data-label);
            position: absolute;
            top: -24px;
            left: -2px;
            background: rgba(245, 162, 69, 0.8);
            color: #000;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            font-weight: 700;
            padding: 2px 6px;
        }

        @keyframes boxFade {
            0% { opacity: 0.3; }
            100% { opacity: 1; border-color: #ff9b42; }
        }

        /* Diagnostics Sidebar (within scan) */
        .hud-diagnostics {
            position: absolute;
            top: 30px;
            right: 30px;
            width: 250px;
            z-index: 5;
            background: rgba(10, 14, 10, 0.7);
            border: 1px solid rgba(197, 242, 85, 0.3);
            border-radius: 12px;
            padding: 20px;
            backdrop-filter: blur(10px);
        }

        .hud-title {
            font-size: 14px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .hud-title .dot {
            width: 8px;
            height: 8px;
            background: #ff5252;
            border-radius: 50%;
            animation: recBlink 1s infinite;
        }

        @keyframes recBlink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.2; }
        }

        .diag-row {
            margin-bottom: 12px;
        }

        .diag-label {
            font-size: 11px;
            color: var(--text-gray);
            text-transform: uppercase;
            margin-bottom: 4px;
            font-family: 'JetBrains Mono', monospace;
        }

        .diag-bar {
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            overflow: hidden;
        }

        .diag-fill {
            height: 100%;
            background: #C5F255;
            width: 0%;
            transition: width 0.5s ease;
        }
        
        .diag-fill.orange { background: #F5A245; }
        .diag-fill.purple { background: #A385FF; }

        /* Glitch Effect on Title */
        .glitch-wrapper {
            position: absolute;
            top: 30px;
            left: 30px;
            z-index: 5;
        }
        
        .glitch-text {
            font-size: 32px;
            font-weight: 800;
            color: white;
            text-transform: uppercase;
            position: relative;
            text-shadow: 0.05em 0 0 rgba(255,0,0,0.7), -0.025em -0.05em 0 rgba(0,255,0,0.7), 0.025em 0.05em 0 rgba(0,0,255,0.7);
            animation: glitch 500ms infinite;
            letter-spacing: 2px;
        }

        @keyframes glitch {
            0% { text-shadow: 0.05em 0 0 rgba(255,0,0,0.7), -0.05em -0.025em 0 rgba(0,255,0,0.7), -0.025em 0.05em 0 rgba(0,0,255,0.7); }
            14% { text-shadow: 0.05em 0 0 rgba(255,0,0,0.7), -0.05em -0.025em 0 rgba(0,255,0,0.7), -0.025em 0.05em 0 rgba(0,0,255,0.7); }
            15% { text-shadow: -0.05em -0.025em 0 rgba(255,0,0,0.7), 0.025em 0.025em 0 rgba(0,255,0,0.7), -0.05em -0.05em 0 rgba(0,0,255,0.7); }
            49% { text-shadow: -0.05em -0.025em 0 rgba(255,0,0,0.7), 0.025em 0.025em 0 rgba(0,255,0,0.7), -0.05em -0.05em 0 rgba(0,0,255,0.7); }
            50% { text-shadow: 0.025em 0.05em 0 rgba(255,0,0,0.7), 0.05em 0 0 rgba(0,255,0,0.7), 0 -0.05em 0 rgba(0,0,255,0.7); }
            99% { text-shadow: 0.025em 0.05em 0 rgba(255,0,0,0.7), 0.05em 0 0 rgba(0,255,0,0.7), 0 -0.05em 0 rgba(0,0,255,0.7); }
            100% { text-shadow: -0.025em 0 0 rgba(255,0,0,0.7), -0.025em -0.025em 0 rgba(0,255,0,0.7), -0.025em -0.05em 0 rgba(0,0,255,0.7); }
        }

        /* Camera Flash Overlay */
        .flash-overlay {
            position: fixed;
            inset: 0;
            background: #fff;
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.1s ease-out;
        }

        .flash-overlay.active {
            opacity: 1;
            transition: none;
        }
    </style>
</head>

<body>
    <div class="flash-overlay" id="flashOverlay"></div>
    <div class="dashboard-wrapper">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-logo">
                <img src="logo.png" alt="Farm Logo"
                    style="width: 85px; height: 85px; object-fit: contain; display: block;" />
            </div>
            <div class="sidebar-nav">
                <div class="nav-item" title="Home" onclick="window.location.href='index.html'">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                        <polyline points="9 22 9 12 15 12 15 22" />
                    </svg>
                </div>
                <div class="nav-item" title="Analyze Crop" onclick="window.location.href='crop_history.html'">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z" />
                        <path d="M2 22 12 12" />
                    </svg>
                </div>
                <div class="nav-item" title="Analyze Soil" onclick="window.location.href='soil_history.html'">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="12 2 2 7 12 12 22 7 12 2" />
                        <polyline points="2 12 12 17 22 12" />
                        <polyline points="2 17 12 22 22 17" />
                    </svg>
                </div>
                <div class="nav-item active" title="Live Scan">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="3" />
                        <path d="M3 12h2" />
                        <path d="M19 12h2" />
                        <path d="M12 3v2" />
                        <path d="M12 19v2" />
                        <circle cx="12" cy="12" r="10" />
                    </svg>
                </div>
                <div class="nav-item" title="Field">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21" />
                        <line x1="9" y1="3" x2="9" y2="18" />
                        <line x1="15" y1="6" x2="15" y2="21" />
                    </svg>
                </div>
                <div class="nav-item" title="History">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
                        <path d="M3 3v5h5" />
                        <path d="M12 7v5l4 2" />
                    </svg>
                </div>
            </div>
            <div class="sidebar-bottom">
                <div class="nav-item logout">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                        <polyline points="16 17 21 12 16 7" />
                        <line x1="21" x2="9" y1="12" y2="12" />
                    </svg>
                </div>
                <div class="avatar-circle">
                    <img src="https://i.pravatar.cc/150?img=12" alt="User">
                </div>
            </div>
        </aside>

        <!-- Main Content (Live Scanner) -->
        <div class="live-scan-wrapper">
            <video id="cameraFeed" class="camera-feed" autoplay playsinline muted></video>
            <div class="hud-grid"></div>
            <div class="scanlines"></div>
            
            <div class="glitch-wrapper">
                <div class="glitch-text" title="LIVE FIELD LINK">LIVE FIELD LINK</div>
            </div>

            <!-- Dynamic Targeting Boxes -->
            <div class="bounding-box" data-label="Wheat_Ear_01 [94%]" style="top: 25%; left: 30%; width: 120px; height: 180px;"></div>
            <div class="bounding-box" data-label="Weed_Risk [72%]" style="top: 60%; left: 70%; width: 90px; height: 90px; border-color:#FF5252; background:rgba(255,82,82,0.1)"></div>

            <!-- Sweeping Laser -->
            <div class="laser-sweep"></div>

            <!-- Complex Center Reticle -->
            <div class="reticle">
                <div class="reticle-corner tl"></div>
                <div class="reticle-corner tr"></div>
                <div class="reticle-corner bl"></div>
                <div class="reticle-corner br"></div>
                <div class="reticle-center"></div>
            </div>

            <!-- Diagnostics HUD -->
            <div class="hud-diagnostics">
                <div class="hud-title"><span class="dot"></span> Telemetry Active</div>
                
                <div class="diag-row">
                    <div class="diag-label">Chlorophyll Index (NDVI)</div>
                    <div class="diag-bar"><div class="diag-fill" id="diag1"></div></div>
                </div>
                <div class="diag-row">
                    <div class="diag-label">Moisture Stress</div>
                    <div class="diag-bar"><div class="diag-fill orange" id="diag2"></div></div>
                </div>
                <div class="diag-row">
                    <div class="diag-label">Biomass Density</div>
                    <div class="diag-bar"><div class="diag-fill purple" id="diag3"></div></div>
                </div>
                <div class="diag-row" style="margin-top:20px;">
                    <button id="captureBtn" class="btn-zenspace" style="width:100%; justify-content:center;">
                        CAPTURE REPORT
                    </button>
                </div>
            </div>

            <!-- Terminal Data Stream -->
            <div class="hud-data" id="termData">
                <div class="data-line">> Initializing multi-spectral camera...</div>
                <div class="data-line">> Establishing satellite uplink [OK]</div>
                <div class="data-line">> Calibrating hyperspectral sensors...</div>
            </div>

            <!-- Hidden Canvas for Capture -->
            <canvas id="captureCanvas" style="display:none;"></canvas>
        </div>
    </div>

    <script>
        // Initialize Real Camera
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment' } 
                });
                document.getElementById('cameraFeed').srcObject = stream;
            } catch (err) {
                console.error("Camera access denied or unavailable:", err);
                // Fallback is automatically handled by the CSS background
            }
        }
        initCamera();

        // Animate diagnostics bars randomly
        setInterval(() => {
            document.getElementById('diag1').style.width = Math.floor(60 + Math.random() * 35) + '%';
            document.getElementById('diag2').style.width = Math.floor(20 + Math.random() * 40) + '%';
            document.getElementById('diag3').style.width = Math.floor(70 + Math.random() * 25) + '%';
        }, 1500);

        // Terminal text typing effect generator
        const termData = document.getElementById('termData');
        const logs = [
            "Analyzing crop vigor...",
            "Detecting nitrogen anomalies...",
            "Scanning for pest signatures...",
            "Calculating Evapotranspiration...",
            "Yield prediction models updating...",
            "Soil surface mapping... 100%"
        ];
        
        let logIndex = 0;
        setInterval(() => {
            const line = document.createElement('div');
            line.className = 'data-line typing';
            line.innerText = `> ${logs[logIndex]}`;
            termData.appendChild(line);
            
            if (termData.children.length > 5) {
                termData.removeChild(termData.firstChild);
            }
            
            logIndex = (logIndex + 1) % logs.length;
        }, 2500);

        // Random jitter on bounding boxes
        const boxes = document.querySelectorAll('.bounding-box');
        setInterval(() => {
            boxes.forEach(box => {
                const currentTop = parseFloat(box.style.top);
                const currentLeft = parseFloat(box.style.left);
                box.style.top = (currentTop + (Math.random() - 0.5) * 1) + '%';
                box.style.left = (currentLeft + (Math.random() - 0.5) * 1) + '%';
            });
        }, 100);

        // Capture Frame Logic
        const captureBtn = document.getElementById('captureBtn');
        const videoFeed = document.getElementById('cameraFeed');
        const canvas = document.getElementById('captureCanvas');
        const flashOverlay = document.getElementById('flashOverlay');
        const glitchText = document.querySelector('.glitch-text');

        captureBtn.addEventListener('click', () => {
            // Flash Effect
            flashOverlay.classList.add('active');
            setTimeout(() => flashOverlay.classList.remove('active'), 50);
            
            // UI Update
            captureBtn.innerHTML = 'ANALYZING...';
            captureBtn.style.pointerEvents = 'none';
            glitchText.innerText = 'UPLOADING DATA';
            
            // Wait briefly before capturing and redirecting
            setTimeout(() => {
                try {
                    // Try to capture from video stream
                    if (videoFeed.readyState >= 2) { 
                        canvas.width = videoFeed.videoWidth || 800;
                        canvas.height = videoFeed.videoHeight || 600;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(videoFeed, 0, 0, canvas.width, canvas.height);
                        
                        // Extract base64 image and save to sessionStorage
                        const imageDataUrl = canvas.toDataURL('image/jpeg', 0.8);
                        sessionStorage.setItem('cropAnalysisImage', imageDataUrl);
                    } else {
                        throw new Error('Video not ready');
                    }
                } catch (e) {
                    console.warn("Could not capture video frame, using fallback image.");
                    // Fallback to stock image if camera didn't work
                    sessionStorage.setItem('cropAnalysisImage', 'https://images.unsplash.com/photo-1595054366627-c1d0ca5d0d93?auto=format&fit=crop&q=80&w=1600');
                }

                // Redirect to results
                window.location.href = 'analysis.html';
            }, 1000);
        });
    </script>
</body>

</html>
